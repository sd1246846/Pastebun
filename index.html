<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luau Bin</title>
    <style>
        /* Steel/Charcoal UI - 50% Transparency */
        body { 
            font-family: 'Consolas', monospace; 
            background: #050505; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
        }
        .ui { 
            width: 90%; 
            max-width: 1000px; 
            background: rgba(30, 30, 30, 0.5); 
            backdrop-filter: blur(10px);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 20px;
        }
        textarea { 
            width: 100%; 
            height: 550px; 
            background: rgba(0,0,0,0.6); 
            color: #4ec9b0; 
            border: 1px solid #333; 
            padding: 15px; 
            font-size: 14px; 
            outline: none; 
            resize: none;
            box-sizing: border-box;
        }
        button { 
            width: 100%;
            margin-top: 15px;
            padding: 12px; 
            background: #3b82f6; 
            color: #fff; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            border-radius: 4px;
        }
        #msg { color: #3b82f6; font-size: 12px; margin-top: 10px; text-align: center; height: 15px; }
    </style>
</head>
<body>

    <div class="ui">
        <textarea id="editor" placeholder="-- Paste Luau Script..." spellcheck="false"></textarea>
        <button onclick="publish()">Create & View Raw</button>
        <div id="msg"></div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const msg = document.getElementById('msg');

        // Studio-style Tabs & Brackets
        editor.onkeydown = (e) => {
            const pairs = { '(': ')', '[': ']', '{': '}', '"': '"', "'": "'" };
            if (e.key === 'Tab') {
                e.preventDefault();
                const s = editor.selectionStart;
                editor.value = editor.value.substring(0, s) + "    " + editor.value.substring(editor.selectionEnd);
                editor.selectionStart = editor.selectionEnd = s + 4;
            }
            if (pairs[e.key]) {
                e.preventDefault();
                const s = editor.selectionStart;
                editor.value = editor.value.substring(0, s) + e.key + pairs[e.key] + editor.value.substring(editor.selectionEnd);
                editor.selectionStart = editor.selectionEnd = s + 1;
            }
        };

        async function publish() {
            if (!editor.value) return;
            msg.innerText = "Creating Link...";

            try {
                // Using an anonymous public API (No Token Needed)
                const res = await fetch('https://pasted.py.al/api/pastes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: editor.value })
                });

                const data = await res.json();
                
                // This builds the REAL raw URL
                const rawUrl = `https://pasted.py.al/raw/${data.id}`;

                navigator.clipboard.writeText(rawUrl).then(() => {
                    msg.innerText = "Raw Link Copied!";
                    setTimeout(() => { window.location.href = rawUrl; }, 800);
                });

            } catch (err) {
                msg.innerText = "Error: Service might be down.";
            }
        }
    </script>
</body>
</html>
