<script>
// ===== HARD INLINE RAW (EXECUTES BEFORE EVERYTHING) =====
(function() {
    const search = location.search;
    if (!search.includes("?r=")) return;

    try {
        const data = new URLSearchParams(search).get("r");
        const decoded = decodeURIComponent(atob(data));

        // Immediately wipe document BEFORE HTML parses
        document.write(decoded);

        // Stop page completely
        document.close();
    } catch (e) {
        document.write("Error decoding content.");
        document.close();
    }
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pastebun</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #181a1f, #23262d);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    width: 92%;
    max-width: 950px;
    height: 85vh;
    background: rgba(30, 34, 42, 0.5);
    backdrop-filter: blur(12px);
    border-radius: 14px;
    padding: 18px;
    display: flex;
    flex-direction: column;
}

.header {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 12px;
}

textarea {
    flex: 1;
    width: 100%;
    resize: none;
    border: none;
    outline: none;
    background: #14171c;
    color: #e6e6e6;
    font-size: 14px;
    padding: 14px;
    border-radius: 10px;
    font-family: Consolas, monospace;
}

button {
    margin-top: 14px;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: #3a3f47;
    color: white;
    font-weight: 600;
    cursor: pointer;
}
</style>
</head>

<body>
<div class="container">
    <div class="header">Pastebun</div>

    <textarea id="editor" placeholder="Paste your Luau code here..."></textarea>

    <button id="createBtn">Create & View Raw</button>
</div>

<script>
const editor = document.getElementById("editor");

// TAB SUPPORT
editor.addEventListener("keydown", function(e) {
    if (e.key === "Tab") {
        e.preventDefault();
        const start = this.selectionStart;
        const end = this.selectionEnd;

        this.value =
            this.value.substring(0, start) +
            "    " +
            this.value.substring(end);

        this.selectionStart = this.selectionEnd = start + 4;
    }
});

// BUTTON
document.getElementById("createBtn").onclick = function() {
    const code = editor.value;
    if (!code.trim()) return;

    const encoded = btoa(encodeURIComponent(code));

    const url =
        window.location.origin +
        window.location.pathname +
        "?r=" +
        encoded;

    navigator.clipboard.writeText(url).catch(() => {});
    window.location.href = url;
};
</script>

</body>
</html>
